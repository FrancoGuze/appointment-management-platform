name: Generate Slots

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Call endpoint
        run: |
          curl -f -sS -X POST https://appointment-management-platform.vercel.app/api/slots/generate \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
